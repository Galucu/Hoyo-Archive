<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tsukasa's SavePoint - Cloud Journey Archive</title>
    
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Tailwind CSS Library -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        genshin: {
                            light: '#f4e8c1',
                            gold: '#d3bc8e',
                            dark: '#353b4b',
                            bg: '#1c1f2e'
                        },
                        hsr: {
                            gold: '#d4af37',
                            blue: '#4a72b2',
                            dark: '#111218',
                            bg: '#090a10'
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards',
                        'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'star-twinkle': 'twinkle 4s ease-in-out infinite'
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        twinkle: { '0%, 100%': { opacity: '0.2' }, '50%': { opacity: '0.8' } }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0d0f17;
            color: #ece5d3;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Layer Background Utama (Foto Dynamic) */
        #main-bg-layer {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 1s ease-in-out;
            opacity: 0.25; /* Transparansi agar foto tidak mengganggu teks */
        }

        /* Layer Cahaya dan Pola Bintang (Gradient) */
        #gradient-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(211, 188, 142, 0.05), transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(74, 114, 178, 0.08), transparent 50%),
                url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MDAiIGhlaWdodD0iNDAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSIwLjUiIGZpbGw9IiNmZmYiIG9wYWNpdHk9IjAuNSIvPjxjaXJjbGUgY3g9IjI1MCIgY3k9IjE1MCIgcj0iMSIgZmlsbD0iI2ZmZiIgb3BhY2l0eT0iMC4zIi8+PGNpcmNsZSBjeD0iMTUwIiBjeT0iMzAwIiByPSIwLjgiIGZpbGw9IiNmZmYiIG9wYWNpdHk9IjAuNCIvPjwvc3ZnPg==');
            pointer-events: none;
        }

        .hoyo-panel {
            background: linear-gradient(135deg, rgba(35, 40, 55, 0.8) 0%, rgba(20, 24, 35, 0.9) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(211, 188, 142, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .hoyo-panel::before, .hoyo-panel::after {
            content: ''; position: absolute; width: 6px; height: 6px; background: #d3bc8e;
            opacity: 0.5; transition: opacity 0.3s;
        }
        .hoyo-panel::before { top: -1px; left: -1px; }
        .hoyo-panel::after { bottom: -1px; right: -1px; }
        .hoyo-panel:hover::before, .hoyo-panel:hover::after { opacity: 1; box-shadow: 0 0 10px #d3bc8e; }

        .hoyo-btn {
            background: rgba(211, 188, 142, 0.1);
            border: 1px solid rgba(211, 188, 142, 0.4);
            color: #d3bc8e;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hoyo-btn:hover:not(:disabled) {
            background: rgba(211, 188, 142, 0.9);
            color: #1c1f2e;
            box-shadow: 0 0 20px rgba(211, 188, 142, 0.4);
            transform: translateY(-2px);
        }
        .hoyo-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .text-hoyo-gold {
            background: linear-gradient(to bottom, #fffdf8 0%, #d3bc8e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(211, 188, 142, 0.2);
        }

        .hoyo-frame {
            position: relative;
            padding: 4px;
            background: linear-gradient(to bottom, rgba(211, 188, 142, 0.3), rgba(211, 188, 142, 0.05));
            border-radius: 16px;
        }
        .hoyo-frame-inner {
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .hoyo-input {
            background: rgba(13, 15, 23, 0.6) !important;
            border: 1px solid rgba(211, 188, 142, 0.2) !important;
            color: #ece5d3 !important;
            transition: all 0.3s;
        }
        .hoyo-input:focus {
            border-color: #d3bc8e !important;
            box-shadow: 0 0 15px rgba(211, 188, 142, 0.2) !important;
            outline: none;
        }

        /* Custom File Input Styling */
        input[type="file"]::file-selector-button {
            background-color: rgba(211, 188, 142, 0.2);
            border: 1px solid rgba(211, 188, 142, 0.5);
            color: #d3bc8e;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            margin-right: 1rem;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        input[type="file"]::file-selector-button:hover {
            background-color: #d3bc8e;
            color: #1c1f2e;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(211, 188, 142, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(211, 188, 142, 0.6); }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body class="relative">

    <!-- Background Layers Baru -->
    <div id="main-bg-layer"></div>
    <div id="gradient-overlay"></div>

    <!-- Top Navigation -->
    <nav class="sticky top-0 z-40 bg-black/40 backdrop-blur-xl border-b border-genshin-gold/20 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-6">
                <!-- Back Button -->
                <button id="backBtn" onclick="goBack()" class="hidden group flex items-center gap-2 text-genshin-light/70 hover:text-genshin-gold transition-colors">
                    <div class="w-8 h-8 rounded-full border border-genshin-gold/30 flex items-center justify-center group-hover:bg-genshin-gold/10 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                    </div>
                    <span class="text-sm font-semibold tracking-wider uppercase">BACK</span>
                </button>
                
                <!-- Logo -->
                <div class="flex items-center gap-3 cursor-pointer" onclick="renderView('menu')">
                    <svg class="w-6 h-6 text-genshin-gold animate-star-twinkle" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>
                    <h1 class="text-xl font-bold text-hoyo-gold tracking-widest uppercase hidden sm:block">Tsukasa's SavePoint</h1>
                </div>
            </div>

            <!-- Action Buttons (Login/Add) -->
            <div class="flex items-center gap-3">
                <button id="btnNavLogin" onclick="openLoginModal()" class="flex items-center gap-2 text-genshin-light/50 hover:text-genshin-gold transition-colors px-3 py-2 rounded-full border border-transparent hover:border-genshin-gold/30">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                    <span class="text-xs font-bold tracking-widest hidden sm:block">LOGIN</span>
                </button>

                <button id="btnNavLogout" onclick="handleLogout()" class="hidden items-center gap-2 text-red-400 hover:text-red-300 transition-colors px-3 py-2 rounded-full border border-transparent hover:border-red-900/50">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                </button>

                <button id="btnNavAddMemory" onclick="openModal()" class="hidden hoyo-btn px-6 py-2.5 rounded-full font-bold tracking-wide flex items-center gap-2 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                    ADD MEMORY
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="max-w-7xl mx-auto p-6 mt-4 min-h-[75vh]" id="appRoot">
        <!-- Content rendered by JS -->
    </main>

    <!-- ================= MODAL: LOGIN ================= -->
    <div id="loginModal" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-[60] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="hoyo-panel p-8 rounded-2xl w-full max-w-sm transform scale-95 transition-transform duration-300 shadow-[0_0_50px_rgba(0,0,0,0.8)]" id="loginModalContent">
            
            <div class="flex justify-between items-center mb-6 border-b border-genshin-gold/20 pb-4 relative">
                <div class="absolute -bottom-[1px] left-0 w-1/3 h-[1px] bg-genshin-gold"></div>
                <h3 class="text-xl font-bold text-genshin-light tracking-wide flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-genshin-gold" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4" /></svg>
                    Owner Login
                </h3>
                <button onclick="closeLoginModal()" class="text-genshin-gold/50 hover:text-genshin-gold transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>

            <form id="loginForm" onsubmit="handleLoginSubmit(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold tracking-widest text-genshin-gold/70 uppercase mb-2">Email</label>
                        <input type="email" id="loginEmail" required placeholder="owner@email.com" class="hoyo-input w-full rounded-lg px-4 py-3">
                    </div>
                    <div>
                        <label class="block text-xs font-bold tracking-widest text-genshin-gold/70 uppercase mb-2">Password</label>
                        <input type="password" id="loginPassword" required placeholder="••••••••" class="hoyo-input w-full rounded-lg px-4 py-3">
                    </div>
                </div>

                <div class="mt-8 pt-5 border-t border-genshin-gold/10">
                    <button type="submit" id="btnLoginBtn" class="hoyo-btn w-full py-3 rounded-full font-bold tracking-widest">ACCESS ARCHIVE</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ================= MODAL: ADD MEMORY (PHOTO) ================= -->
    <div id="addModal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="hoyo-panel p-8 rounded-2xl w-full max-w-lg transform scale-95 transition-transform duration-300 shadow-[0_0_50px_rgba(0,0,0,0.8)]" id="modalContent">
            
            <div class="flex justify-between items-center mb-6 border-b border-genshin-gold/20 pb-4 relative">
                <div class="absolute -bottom-[1px] left-0 w-1/3 h-[1px] bg-genshin-gold"></div>
                <h3 class="text-xl font-bold text-genshin-light tracking-wide flex items-center gap-2">
                    <svg class="w-5 h-5 text-genshin-gold" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>
                    Input New Memory
                </h3>
                <button onclick="closeModal()" class="text-genshin-gold/50 hover:text-genshin-gold transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>

            <form id="memoryForm" onsubmit="handleFormSubmit(event)">
                <div class="space-y-5 max-h-[60vh] overflow-y-auto pr-3">
                    
                    <div>
                        <label class="block text-xs font-bold tracking-widest text-genshin-gold/70 uppercase mb-2">Select Universe</label>
                        <select id="inputGame" onchange="toggleFormFields()" required class="hoyo-input w-full rounded-lg px-4 py-3">
                            <option value="Genshin Impact">Genshin Impact (Teyvat)</option>
                            <option value="Honkai Star Rail">Honkai: Star Rail (Astral)</option>
                        </select>
                    </div>

                    <div id="categoryContainer">
                        <label class="block text-xs font-bold tracking-widest text-genshin-gold/70 uppercase mb-2">Journey Category</label>
                        <select id="inputCategory" onchange="toggleFormFields()" class="hoyo-input w-full rounded-lg px-4 py-3">
                            <option value="My Journey">Personal Journey Log</option>
                            <option value="Friends">Companion Memory Archive</option>
                        </select>
                    </div>

                    <div id="friendNameContainer" class="hidden">
                        <label class="block text-xs font-bold tracking-widest text-genshin-gold/70 uppercase mb-2">Select Travel Companion</label>
                        <select id="inputFriendName" class="hoyo-input w-full rounded-lg px-4 py-3">
                            <!-- Options filled by JS -->
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold tracking-widest text-genshin-gold/70 uppercase mb-2">Visual (Upload Image)</label>
                        <input type="file" id="inputImgFile" accept="image/*" required class="hoyo-input w-full rounded-lg px-4 py-3">
                    </div>

                    <div>
                        <label class="block text-xs font-bold tracking-widest text-genshin-gold/70 uppercase mb-2">Epic Notes for this Photo</label>
                        <textarea id="inputDescription" required rows="3" placeholder="Write down the memory that happened..." class="hoyo-input w-full rounded-lg px-4 py-3 resize-none"></textarea>
                    </div>
                </div>

                <div class="mt-8 flex gap-4 justify-end pt-5 border-t border-genshin-gold/10">
                    <button type="button" onclick="closeModal()" class="px-6 py-2.5 rounded-full text-genshin-light/70 hover:text-white font-medium tracking-wide transition-colors">CANCEL</button>
                    <button type="submit" id="btnSaveMemory" class="hoyo-btn px-8 py-2.5 rounded-full font-bold tracking-widest">SAVE MEMORY</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ================= MODAL: ADD/EDIT COMPANION ================= -->
    <div id="friendModal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[55] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="hoyo-panel p-8 rounded-2xl w-full max-w-lg transform scale-95 transition-transform duration-300 shadow-[0_0_50px_rgba(0,0,0,0.8)]" id="friendModalContent">
            
            <div class="flex justify-between items-center mb-6 border-b border-genshin-gold/20 pb-4 relative">
                <div class="absolute -bottom-[1px] left-0 w-1/3 h-[1px] bg-genshin-gold"></div>
                <h3 id="friendModalTitle" class="text-xl font-bold text-genshin-light tracking-wide flex items-center gap-2">
                    <svg class="w-5 h-5 text-genshin-gold" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                    Companion Profile
                </h3>
                <button onclick="closeFriendModal()" class="text-genshin-gold/50 hover:text-genshin-gold transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>

            <form id="friendForm" onsubmit="handleFriendSubmit(event)">
                <div class="space-y-5">
                    <input type="hidden" id="friendEditId">
                    <input type="hidden" id="friendOldName">
                    
                    <div>
                        <label class="block text-xs font-bold tracking-widest text-genshin-gold/70 uppercase mb-2">Character / Companion Name</label>
                        <input type="text" id="friendInputName" required placeholder="E.g., Zhongli, Klee..." class="hoyo-input w-full rounded-lg px-4 py-3">
                    </div>

                    <div>
                        <label class="block text-xs font-bold tracking-widest text-genshin-gold/70 uppercase mb-2">Profile Picture (Upload Avatar)</label>
                        <input type="file" id="friendInputAvatar" accept="image/*" class="hoyo-input w-full rounded-lg px-4 py-3">
                        <p id="friendAvatarHelp" class="text-[10px] text-genshin-gold/50 mt-1.5 hidden">Leave empty if you don't want to change the image.</p>
                    </div>

                    <div>
                        <label class="block text-xs font-bold tracking-widest text-genshin-gold/70 uppercase mb-2">Short Description About Them</label>
                        <textarea id="friendInputDesc" required rows="3" placeholder="Who are they? Briefly describe their profile..." class="hoyo-input w-full rounded-lg px-4 py-3 resize-none"></textarea>
                    </div>
                </div>

                <div class="mt-8 flex gap-4 justify-end pt-5 border-t border-genshin-gold/10">
                    <button type="button" onclick="closeFriendModal()" class="px-6 py-2.5 rounded-full text-genshin-light/70 hover:text-white font-medium tracking-wide transition-colors">CANCEL</button>
                    <button type="submit" id="btnSaveFriend" class="hoyo-btn px-8 py-2.5 rounded-full font-bold tracking-widest">SAVE PROFILE</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ================= MODAL: VIEW PHOTO (LIGHTBOX) ================= -->
    <div id="imageLightbox" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-[100] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300" onclick="closeLightbox()">
        <img id="lightboxImg" src="" class="max-w-[90vw] max-h-[90vh] object-contain rounded-lg border border-genshin-gold/30 shadow-[0_0_50px_rgba(211,188,142,0.15)] transition-transform duration-300 transform scale-95">
        <button class="absolute top-6 right-6 text-genshin-gold/50 hover:text-genshin-gold transition-colors" title="Close">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-20 left-1/2 transform -translate-x-1/2 -translate-y-20 opacity-0 transition-all duration-500 z-50 pointer-events-none">
        <div class="hoyo-panel px-8 py-3 rounded-full flex items-center gap-3">
            <svg class="w-5 h-5 text-genshin-gold" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
            <span id="toastMessage" class="text-genshin-light font-medium tracking-wide">Data saved to Irminsul.</span>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. SUPABASE CLOUD CONFIGURATION
        // ==========================================
        
        const SUPABASE_URL = 'https://lyohztycfoeiavrthshb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5b2h6dHljZm9laWF2cnRoc2hiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NDE2NTQsImV4cCI6MjA4OTUxNzY1NH0.tke4BeUUaTpffzuUMyE_BIcOoH33a6TbkoqMGQdBqgA';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // App State
        let memories = [];
        let friendsList = [];
        let currentState = { view: 'menu', selectedGame: null, selectedFriend: null };
        let currentUser = null; 

        // Variable untuk menyimpan Setting Background dari Cloud (Default Fallbacks)
        let appSettings = {
            main_bg: '', // Tambahan untuk Main Background
            genshin_bg: 'https://images.unsplash.com/photo-1580136608260-4eb11f4b24fe?auto=format&fit=crop&q=80',
            hsr_bg: 'https://images.unsplash.com/photo-1614729939124-032f0b56c9ce?auto=format&fit=crop&q=80'
        };

        // ==========================================
        // 1.5 AUTHENTICATION (LOGIN) SYSTEM
        // ==========================================

        async function checkAuthStatus() {
            const { data: { user } } = await _supabase.auth.getUser();
            currentUser = user;
            updateNavbarUI();
        }

        function updateNavbarUI() {

        function openLoginModal() {
            const modal = document.getElementById('loginModal');
            const content = document.getElementById('loginModalContent');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => content.classList.remove('scale-95'), 10);

            const modal = document.getElementById('loginModal');
            const content = document.getElementById('loginModalContent');
            content.classList.add('scale-95');

        async function handleLoginSubmit(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('btnLoginBtn');
            const originalText = btn.innerText;

            btn.innerText = "AUTHENTICATING...";
            btn.disabled = true;

            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                alert("Login Gagal: " + error.message);
                btn.innerText = originalText;
                btn.disabled = false;
            } else {
                closeLoginModal();
                showToast("Welcome back, Archive Owner.");
                await checkAuthStatus();
                document.getElementById('loginForm').reset();
                renderView(currentState.view, currentState.view === 'game' ? currentState.selectedGame : currentState.selectedFriend);
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        async function handleLogout() {
            if(confirm('Are you sure you want to log out and return as a Visitor?')) {
                await _supabase.auth.signOut();
                await checkAuthStatus();
                showToast("You have been logged out.");
                renderView(currentState.view, currentState.view === 'game' ? currentState.selectedGame : currentState.selectedFriend);
            }
        }

        // ==========================================
        // 2. CLOUD SYNC & REAL-TIME FUNCTIONS
        // ==========================================
        
        async function fetchDataCloud() {
            try {
                // Fetch Settings untuk Background Menu & Main BG
                const { data: sData, error: sErr } = await _supabase.from('settings').select('*');
                if (!sErr && sData) {
                    sData.forEach(setting => {
                        if (setting.key === 'genshin_bg') appSettings.genshin_bg = setting.value;
                        if (setting.key === 'hsr_bg') appSettings.hsr_bg = setting.value;
                        if (setting.key === 'main_bg') appSettings.main_bg = setting.value;
                    });
                    
                    // Apply Main Background jika ada datanya di Supabase
                    if(appSettings.main_bg) {
                        document.getElementById('main-bg-layer').style.backgroundImage = `url('${appSettings.main_bg}')`;
                    }
                }

                // Fetch data utama
                const { data: fData, error: fErr } = await _supabase.from('friends').select('*').order('name');
                if (fErr) throw fErr;
                if (fData) friendsList = fData;
                
                const { data: mData, error: mErr } = await _supabase.from('memories').select('*').order('id', { ascending: false });
                if (mErr) throw mErr;
                if (mData) memories = mData;

                // Render ulang jika sedang di menu untuk update background
                if (currentState.view === 'menu') {
                    renderView('menu');
                } else {
                    renderView(currentState.view, currentState.view === 'game' ? currentState.selectedGame : currentState.selectedFriend);
                }
            } catch (err) {
                console.error("Failed to sync data:", err);
            }
        }

        function setupRealtime() {
            _supabase.channel('public-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'memories' }, payload => { fetchDataCloud(); })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'friends' }, payload => { fetchDataCloud(); })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'settings' }, payload => { fetchDataCloud(); })
                .subscribe();
        }

        async function uploadKeStorage(file, folder) {
            const ext = file.name.split('.').pop();
            const fileName = `${folder}/${Date.now()}_img.${ext}`;
            
            const { data, error } = await _supabase.storage.from('foto-user').upload(fileName, file);
            if (error) throw error;
            
            const { data: urlData } = _supabase.storage.from('foto-user').getPublicUrl(fileName);
            return urlData.publicUrl;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuthStatus();
            renderView('menu'); 
            fetchDataCloud();  
            setupRealtime();   
        });

        }

        function openModal(preselectedFriend = null) {
            document.getElementById('inputGame').value = currentState.selectedGame || 'Genshin Impact';
            populateFriendOptions();
            
            if (preselectedFriend) {
                document.getElementById('inputCategory').value = 'Friends';
                setTimeout(() => { document.getElementById('inputFriendName').value = preselectedFriend; }, 0);
            }

            document.getElementById('inputImgFile').value = ''; 
            toggleFormFields();
            
            const modal = document.getElementById('addModal');
            const content = document.getElementById('modalContent');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => content.classList.remove('scale-95'), 10);
        }

        function closeModal() {
            const modal = document.getElementById('addModal');
            const content = document.getElementById('modalContent');
            content.classList.add('scale-95');
            setTimeout(() => modal.classList.add('opacity-0', 'pointer-events-none'), 300);
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSaveMemory');
            const originalText = btn.innerText;
            btn.innerText = "UPLOADING..."; 
            btn.disabled = true;

            try {
                const game = document.getElementById('inputGame').value;
                const category = game === 'Honkai Star Rail' ? 'My Journey' : document.getElementById('inputCategory').value;
                const friendName = document.getElementById('inputFriendName').value;
                const fileInput = document.getElementById('inputImgFile');

                if (category === 'Friends' && !friendName) throw new Error("Add a companion to the list first!");
                if (!fileInput.files || !fileInput.files[0]) throw new Error("Select an image first.");

                const publicUrl = await uploadKeStorage(fileInput.files[0], 'memories');

                const newMem = {
                    id: Date.now(),
                    game: game,
                    category: category,
                    friendName: category === 'Friends' ? friendName : '',
                    imgUrl: publicUrl,
                    description: document.getElementById('inputDescription').value
                };

                const { error: dbErr } = await _supabase.from('memories').insert([newMem]);
                if (dbErr) throw dbErr;

                closeModal();
                showToast('New memory successfully synced to Cloud.');
                document.getElementById('memoryForm').reset();
                toggleFormFields();

            } catch (err) {
                alert("Failed: " + err.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        async function deleteMemory(id, event) {
            if(event) event.stopPropagation(); 
            if(confirm('Warning: Photo will be permanently deleted from the Cloud. Continue?')) {
                const { error } = await _supabase.from('memories').delete().eq('id', id);
                if (!error) {
                    showToast('Photo successfully deleted.');
                } else {
                    alert("Failed to delete: " + error.message);
                }
            }
        }

        // ==========================================
        // 5. CLOUD FORM LOGIC (COMPANIONS)
        // ==========================================
        function openFriendModal(friendId = null) {
            const modal = document.getElementById('friendModal');
            const content = document.getElementById('friendModalContent');
            const titleText = document.getElementById('friendModalTitle');
            const fileInput = document.getElementById('friendInputAvatar');
            const helpText = document.getElementById('friendAvatarHelp');
            
            fileInput.value = ''; 

            if (friendId) {
                const friend = friendsList.find(f => f.id === friendId);
                document.getElementById('friendEditId').value = friend.id;
                document.getElementById('friendOldName').value = friend.name;
                document.getElementById('friendInputName').value = friend.name;
                document.getElementById('friendInputDesc').value = friend.description;
                
                fileInput.required = false; 
                helpText.classList.remove('hidden');
                titleText.innerHTML = '<svg class="w-5 h-5 text-genshin-gold" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg> Edit Companion Profile';
            } else {
                document.getElementById('friendForm').reset();
                document.getElementById('friendEditId').value = '';
                document.getElementById('friendOldName').value = '';
                
                fileInput.required = true; 
                helpText.classList.add('hidden');
                titleText.innerHTML = '<svg class="w-5 h-5 text-genshin-gold" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg> Add New Companion';
            }

            modal.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => content.classList.remove('scale-95'), 10);
        }

        function closeFriendModal() {
            const modal = document.getElementById('friendModal');
            const content = document.getElementById('friendModalContent');
            content.classList.add('scale-95');
            setTimeout(() => modal.classList.add('opacity-0', 'pointer-events-none'), 300);
        }

        async function handleFriendSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSaveFriend');
            const originalText = btn.innerText;
            btn.innerText = "SAVING..."; 
            btn.disabled = true;

            try {
                const id = document.getElementById('friendEditId').value;
                const oldName = document.getElementById('friendOldName').value;
                const name = document.getElementById('friendInputName').value;
                const description = document.getElementById('friendInputDesc').value;
                const fileInput = document.getElementById('friendInputAvatar');

                let finalAvatarUrl = '';

                if (id) {
                    const friend = friendsList.find(f => f.id == id);
                    if (fileInput.files && fileInput.files[0]) {
                        finalAvatarUrl = await uploadKeStorage(fileInput.files[0], 'avatars');
                    } else {
                        finalAvatarUrl = friend.avatarUrl; 
                    }

                    await _supabase.from('friends').update({ name, avatarUrl: finalAvatarUrl, description }).eq('id', id);
                    
                    if (oldName !== name) {
                        await _supabase.from('memories').update({ friendName: name }).eq('friendName', oldName);
                        if (currentState.selectedFriend === oldName) currentState.selectedFriend = name;
                    }
                    showToast('Character profile successfully updated.');
                } else {
                    if (!fileInput.files[0]) throw new Error("Select an avatar image.");
                    finalAvatarUrl = await uploadKeStorage(fileInput.files[0], 'avatars');
                    
                    const newFriend = { id: Date.now(), name, avatarUrl: finalAvatarUrl, description };
                    await _supabase.from('friends').insert([newFriend]);
                    showToast('New character added to the Cloud.');
                }
                
                closeFriendModal();

            } catch (err) {
                alert("Failed: " + err.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        async function deleteFriend(friendId) {
            if(confirm('WARNING: Are you sure you want to delete this companion? ALL related photos in the Cloud will be permanently deleted!')) {
                const friend = friendsList.find(f => f.id === friendId);
                
                if (friend) {
                    await _supabase.from('friends').delete().eq('id', friendId);
                    await _supabase.from('memories').delete().eq('friendName', friend.name);
                    
                    showToast('Companion and all related memories have been deleted.');
                    renderView('game', currentState.selectedGame);
                }
            }
        }

        // --- TOAST / NOTIFICATION SYSTEM ---
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').innerText = msg;
            
            toast.classList.remove('-translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('-translate-y-20', 'opacity-0');
            }, 3500);
        }
    </script>
